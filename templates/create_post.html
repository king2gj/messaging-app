{% extends "base.html" %}
{% block title %}Create Post{% endblock %}
{% block content %}

{% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
{% endif %}

<div>
  <button id="open-create-btn" class="btn btn-primary">Create Post</button>

  <dialog id="create-form-dialog">
    <div class="auth-card" style="width:100%;max-width:720px;">
      <div class="card-body">
        <h1 class="auth-title">Create Post</h1>
        <p class="auth-sub">Write something great and share it with others.</p>

        <form action="/create_post" method="post" enctype="multipart/form-data" id="create-post-form">
          <label for="title">Title</label>
          <input id="title" name="title" class="form-control mb-3" type="text" placeholder="Enter a title" required />

          <label for="content">Content</label>
          <textarea id="content" name="content" class="form-control mb-3" rows="10" placeholder="Write your post here..." required></textarea>

          <label for="group_id">Post to Course</label>
          <select id="group_id" name="group_id" class="form-select mb-3" required>
            <option value="">-- Select a course --</option>
            {% for course in courses %}
              <option value="{{ course[3].hex() }}">{{ course[1] }} - {{ course[2] }}</option>
            {% endfor %}
          </select>

          <label for="tags">Tags (optional)</label>
          <input id="tags" name="tags" class="form-control mb-3" type="text" placeholder="e.g. notes,python" />

          <label for="image">Cover image (optional)</label>
          <input id="image" name="image" class="form-control mb-3" type="file" accept="image/*" />

          <div style="display:flex; gap:12px; margin-top:18px;">
            <button class="btn btn-primary btn-lg" type="submit">Publish</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </dialog>
</div>

<script>
  const createBtn = document.getElementById('open-create-btn');
  const createDialog = document.getElementById('create-form-dialog');
  if (createBtn && createDialog) {
      createBtn.addEventListener('click', () => createDialog.showModal());
  }
</script>

{% endblock %}
