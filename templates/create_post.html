<!-- This is temporary code with buttons for the create and update post functionality. -->

<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/style1.css">
    <title>Create Post</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" style="background-color: #1c8ee0;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Message Board Name</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
        <a class="nav-link" href="home.html">Home</a>
        </li>
        <li class="nav-item">
        <a class="nav-link" href="account.html">Accounts</a>
        </li>
            <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="view_post.html">Posts</a>
            </li>
        </ul>
        <form class="d-flex">
            <input class="form-control me-2" type="search" placeholder="Enter Your Search Here" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        </div>
    </div>
    </nav>

    <div>
        <!-- The button to open the modal -->
        <button id="open-create-btn">Create Post</button>

        <!-- The dialog element with a form inside -->
        <dialog id="create-form-dialog">
                <div class="auth-card" style="width:100%;max-width:720px;">
                    <div class="card-body">
                        <h1 class="auth-title">Create Post</h1>
                        <p class="auth-sub">Write something great and share it with others.</p>

                        <form action="/create_post" method="post" enctype="multipart/form-data" id="create-post-form">
                        <label for="title">Title</label>
                        <input id="title" name="title" class="form-control" type="text" placeholder="Enter a title" required />

                        <label for="content">Content</label>
                        <textarea id="content" name="content" class="form-control" rows="10" placeholder="Write your post here..." required></textarea>

                        <label for="tags">Tags (optional)</label>
                        <input id="tags" name="tags" class="form-control" type="text" placeholder="e.g. notes,python" />

                        <label for="image">Cover image (optional)</label>
                        <input id="image" name="image" class="form-control" type="file" accept="image/*" />

                        <div style="display:flex; gap:12px; margin-top:18px;">
                            <button class="btn-primary btn-lg" type="submit">Publish</button>
                            <a href="view_post.html" class="btn btn-secondary align-items-center">Cancel</a>
                            <!-- <button type="button" onclick="history.back()">Cancel</button> -->
                        </div>
                        </form>
                    </div>
                </div>
        </dialog>
    </div>
    <div>
        <button id="open-update-btn">Update Post</button>

        <!-- The dialog element with a form inside -->
        <dialog id="update-form-dialog">
                <div class="auth-card" style="width:100%;max-width:720px;">
                    <div class="card-body">
                        <h1 class="auth-title">Update Post</h1>
                        <p class="auth-sub">Update your post and share the changes.</p>

                        <form action="/update_post" method="post" enctype="multipart/form-data" id="update-post-form">
                        <label for="update-title">Title</label>
                        <input id="update-title" name="title" class="form-control" type="text" value="{{ title }}" required />

                        <label for="update-content">Content</label>
                        <textarea id="update-content" name="content" class="form-control" rows="10"required>{{ content }}</textarea>

                        <label for="update-tags">Tags (optional)</label>
                        <input id="update-tags" name="tags" class="form-control" type="text" value="{{ tags }}" />

                        <label for="update-image">Change Cover image (optional)</label>
                        <input id="update-image" name="image" class="form-control" type="file" accept="image/*" />

                        <div style="display:flex; gap:12px; margin-top:18px;">
                            <button class="btn-primary btn-lg" type="submit">Publish</button>
                            <!-- <a href="view_post.html" class="btn btn-secondary align-items-center">Cancel</a> -->
                            <!-- <button type="button" onclick="history.back()">Cancel</button> -->
                            <div class="text-end">
                                <a href="view_post.html" class="btn btn-secondary edit-btn">Cancel</a>
                            </div>
                        </div>
                        </form>
                    </div>
                </div>
        </dialog>
    </div>

    <script>
    // Wire both create and update dialog buttons to their dialogs
    // (Double check with Nate to see if this works with flask)
    const createBtn = document.getElementById('open-create-btn');
    const createDialog = document.getElementById('create-form-dialog');
    const updateBtn = document.getElementById('open-update-btn');
    const updateDialog = document.getElementById('update-form-dialog');

    if (createBtn && createDialog) {
        createBtn.addEventListener('click', () => createDialog.showModal());
    }
    if (updateBtn && updateDialog) {
        updateBtn.addEventListener('click', () => updateDialog.showModal());
    }
    </script>




</body>
</html>
