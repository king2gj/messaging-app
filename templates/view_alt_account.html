<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/style1.css">
    <title>Profile</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" style="background-color: #1c8ee0;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Message Board Name</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
        <a class="nav-link" href="home.html">Home</a>
        </li>
        <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="account.html">Accounts</a>
        </li>
            <li class="nav-item">
            <a class="nav-link" href="view_post.html">Posts</a>
            </li>
        </ul>
        <form class="d-flex">
            <input class="form-control me-2" type="search" placeholder="Enter Your Search Here" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        </div>
    </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="profile-card">
            <div class="d-flex align-items-center mb-3">
              <img src="https://via.placeholder.com/96" alt="User avatar" class="profile-avatar me-3">
              <div>
                <h2 id="profile-name" class="mb-0">{{ name }}</h2>
                <p id="profile-email" class="text-muted mb-0">{{ email }}</p>
              </div>
            </div>
                
            <!-- <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" value="{{ password }}" readonly>
            </div> -->

            <div class="mb-3">
              <label class="form-label">Role:</label>
              <input type="text" class="form-control" value="{{ role }}" readonly>
            </div>

            <!-- This can be deleted, I just put it here if we want to have it -->
            <div class="mb-3">
              <label class="form-label">Date Joined:</label>
              <input type="text" class="form-control" value="{{ date_joined }}" readonly>
            </div>

            <div class="mb-3">
              <label class="form-label">Bio</label>
              <textarea class="form-control" rows="4" placeholder="Write a short bio..." readonly>{{ bio }}</textarea>
            </div>

            <!-- <div class="text-end">
              <a href="account_edit.html" class="btn btn-primary edit-btn">Edit Profile</a>
            </div> -->

            <!-- This can also be deleted, I just put it here if we want to have it -->
            <div class="text-end mt-2">
              <a href="view_post.html" class="btn btn-secondary">View User's Posts</a>
            </div>

            <!-- Admin controls: visible to admins only -->
            {% if is_admin or current_user_role == 'admin' %}
            <div class="text-end mt-3">
              <form method="post" action="/admin/ban_user" class="d-inline"
                    data-confirm="{{ 'Unban this user?' if is_banned else 'Ban this user?' }}"
                    onsubmit="event.preventDefault(); confirmAction(this)">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <input type="hidden" name="action" value="{{ 'unban' if is_banned else 'ban' }}">
                <button type="submit" class="btn btn-warning">
                  {{ 'Unban' if is_banned else 'Ban' }}
                </button>
              </form>

              <form method="post" action="/admin/delete_user" class="d-inline ms-2"
                    data-confirm="Permanently delete this account? This cannot be undone."
                    onsubmit="event.preventDefault(); confirmAction(this)">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <button type="submit" class="btn btn-danger">Delete Account</button>
              </form>
            </div>
            {% endif %}

          </div>
        </div>
      </div>
    </main>
    <script>
      function confirmAction(form) {
        var msg = form.dataset.confirm || 'Are you sure?';
        if (confirm(msg)) {
          form.submit();
        }
      }
    </script>
  </body>
</html>
