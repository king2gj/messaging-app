<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Sign Up - Message Board</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
		<link href="static/css/style1.css" rel="stylesheet">
	</head>
	<body class="bg-light">
		<header class="site-brand">
			<a href="#">Message Board (Web Name)</a>
		</header>
		<div class="d-flex align-items-start justify-content-center" style="min-height:100vh;padding-top:48px;">
			<div class="card shadow-sm" style="width:100%;max-width:480px;">
				<div class="card-body">
					<form class="p-4"action="/signup" method="POST">
						<img src="https://via.placeholder.com/96?text=Logo" alt="App logo" class="mb-3 mx-auto d-block rounded" style="width:96px;height:96px;">
						<h1 class="h3 mb-1">Create Account</h1>
						<p class="text-muted mb-3 small">Please fill in the fields below</p>

						<div class="row g-2 mb-3">
							<div class="col">
								<input type="text" id="firstName" name="firstName" class="form-control" placeholder="First name" required>
							</div>
							<div class="col">
								<input type="text" id="lastName" name="lastName" class="form-control" placeholder="Last name" required>
							</div>
						</div>

						<div class="mb-3">
							<input type="email" id="email" name="email" class="form-control" placeholder="Email address" required>
						</div>

						<div class="mb-3">
							<input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
						</div>

						<div class="mb-3">
							<input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Confirm password" required>
						</div>

						<div class="mt-3 d-flex align-items-center justify-content-between">
							<button type="submit" class="btn btn-lg btn-primary">Sign Up</button>
							<p class="mb-0 ms-3">Already have an account? <a href="signin">Sign in</a></p>
						</div>
					</form>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
	</body>
</html>
