<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Message Board Login Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link href="static/css/style1.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <header class="site-brand">
			<a href="#">Message Board (Web Name)</a>
		</header>
    <div class="d-flex align-items-start justify-content-center" style="min-height:100vh;padding-top:48px;">
      <div class="card shadow-sm" style="width:100%;max-width:480px;">
        <div class="card-body">
          <form class="p-4"action="/signin" method="POST">
            <img src="https://via.placeholder.com/96?text=Logo" alt="App logo" class="mb-3 mx-auto d-block rounded" style="width:96px;height:96px;">
            <h1 class="h3 mb-1 font-weight-normal">Welcome Back</h1>
            <p class="text-muted mb-3 small">Please enter your credentials below</p>
        <!--
        <label for="emailAddress"
        class="sr-only">Email Address</label>
        -->
        <div class="mb-3">
        <input type="email" id="emailAddress" name ="email"
        class="form-control" placeholder="Email Address"
        required autofocus>
        </div>
        <!--
        <label for="password"
        class="sr-only">Password</label>
        -->
        <div class="mb-3">
        <input type="password" id="pwd" name="password"
        placeholder="Password" class="form-control">
        </div>
        <div class="checkbox">
            <label>
                <input type="checkbox"
                value="remember-me"> Remember Me
            </label>
        </div>
            <div class="mt-3 d-flex align-items-center justify-content-between">
              <button type="submit" class="btn btn-lg btn-primary">Sign In</button>
              <p class="mb-0 ms-3">Don't have an account? <a href="signup">Sign up</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
  </body>
</html>
