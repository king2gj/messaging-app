<!doctype html>
<html lang="en">
{% extends "base.html" %}
{% block title %}Account{% endblock %}
{% block content %}
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="profile-card">
            <div class="d-flex align-items-center mb-3">
              <img src="https://via.placeholder.com/96" alt="User avatar" class="profile-avatar me-3">
              <div>
                <h2 id="profile-name" class="mb-0">{{ user.username }}</h2>
                <p id="profile-email" class="text-muted mb-0">{{ user.first_name }} {{ user.last_name }}</p>
                <p id="profile-email" class="text-muted mb-0">{{ user.email }}</p>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Bio</label>
              <textarea class="form-control" rows="4" placeholder="No bio yet." readonly>{{ user.bio }}</textarea>
            </div>

            <div class="text-end">
              <a href="account_edit" class="btn btn-primary edit-btn">Edit Profile</a>
            </div>
            <div class="text-end mt-2">
              <a href="view_my_post.html" class="btn btn-secondary">View My Posts</a>
            </div>
          </div>
        </div>
      </div>
    </main>
{% endblock %}
  </body>
</html>
