<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/style1.css">
    <title>Profile</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" style="background-color: #1c8ee0;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Message Board Name</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
        <a class="nav-link" href="home.html">Home</a>
        </li>
        <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="account.html">Accounts</a>
        </li>
            <li class="nav-item">
            <a class="nav-link" href="view_post.html">Posts</a>
            </li>
        </ul>
        <form class="d-flex">
            <input class="form-control me-2" type="search" placeholder="Enter Your Search Here" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        </div>
    </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="profile-card">
            <div class="d-flex align-items-center mb-3">
              <img src="https://via.placeholder.com/96" alt="User avatar" class="profile-avatar me-3">
              <div>
                <h2 id="profile-name" class="mb-0">{{ name }}</h2>
                <p id="profile-email" class="text-muted mb-0">{{ email }}</p>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" value="{{ password }}" readonly>
            </div>

            <div class="mb-3">
              <label class="form-label">Bio</label>
              <textarea class="form-control" rows="4" placeholder="Write a short bio..." readonly>{{ bio }}</textarea>
            </div>

            <div class="text-end">
              <a href="account_edit" class="btn btn-primary edit-btn">Edit Profile</a>
            </div>
            <div class="text-end mt-2">
              <a href="view_my_post.html" class="btn btn-secondary">View My Posts</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
